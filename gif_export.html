<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>GIF export — text streaming</title>
<style>
  :root{
    --bg: oklch(0.985 0.003 80);
    --ink: oklch(0.18 0.005 80);
    --ink-2: oklch(0.38 0.005 80);
    --ink-3: oklch(0.58 0.004 80);
    --line: oklch(0.9 0.004 80);
    --chip: oklch(0.955 0.004 80);
    --chip-2: oklch(0.925 0.004 80);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:Helvetica, "Helvetica Neue", Arial, sans-serif;-webkit-font-smoothing:antialiased}
  .page{padding:20px}
  .controls{
    display:flex;gap:10px;align-items:center;margin-bottom:16px;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:12px;color:var(--ink-2)
  }
  button{
    font:inherit;padding:8px 14px;border-radius:8px;border:1px solid var(--line);
    background:#fff;cursor:pointer;color:var(--ink);
  }
  button:hover{background:var(--chip)}
  #status{color:var(--ink-3)}

  /* The capture target — exact size becomes the GIF size */
  #stage{
    width:640px;height:340px;
    background:var(--bg);
    padding:20px;display:flex;gap:20px;align-items:center;justify-content:center;
    border:1px solid var(--line);border-radius:0;
  }
  .cell{
    width:300px;height:300px;background:#fff;border:1px solid var(--line);border-radius:14px;
    position:relative;overflow:hidden;
    box-shadow: 0 1px 0 oklch(0.88 0.004 80), 0 10px 24px -16px oklch(0.2 0.01 80 / .18);
  }
  .chrome{position:absolute;inset:0;display:flex;flex-direction:column;padding:12px 12px 10px}
  .titlebar{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:10px;border-bottom:1px solid var(--line);
    color:var(--ink-3);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--ink);display:inline-block;margin-right:6px;vertical-align:1px}
  .thread{flex:1;display:flex;flex-direction:column;gap:10px;padding-top:12px;overflow:hidden}
  .row{display:flex;gap:8px;align-items:flex-end}
  .row.user{justify-content:flex-end}
  .avatar{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex:0 0 22px}
  .avatar.u{background:var(--chip-2);color:var(--ink)}
  .bubble{max-width:220px;padding:8px 11px;border-radius:12px;font-size:12.5px;line-height:1.42;color:var(--ink)}
  .bubble.user{background:var(--ink);color:#fff;border-bottom-right-radius:4px}
  .bubble.ai{background:var(--chip);border-bottom-left-radius:4px}
  .bubble.ai.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:11.5px}

  .tok{display:inline-block;white-space:pre;opacity:0;transform:translateY(3px);filter:blur(1.5px);animation:tokIn 340ms cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes tokIn{to{opacity:1;transform:translateY(0);filter:blur(0)}}

  .tw{font-variant-ligatures:none;white-space:pre-wrap;word-break:break-word}
  .caret{display:inline-block;width:0.55ch;height:1em;vertical-align:-0.15em;background:var(--ink);margin-left:1px;animation:blink .9s steps(2,end) infinite}
  @keyframes blink{50%{opacity:0}}

  .status{display:flex;align-items:center;gap:6px;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:10px;color:var(--ink-3);letter-spacing:0.06em;text-transform:uppercase;padding-left:30px;height:12px}
  .status .pulse{width:6px;height:6px;border-radius:50%;background:var(--ink-3);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}

  .caption{position:absolute;left:12px;bottom:8px;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:9px;color:var(--ink-3);letter-spacing:0.08em;text-transform:uppercase}

  #preview{margin-top:16px;max-width:100%;border:1px solid var(--line);border-radius:8px;display:block}
  a.download{margin-left:10px}
</style>
</head>
<body>
<div class="page">
  <div class="controls">
    <button id="record">Record GIF</button>
    <span id="status">Idle — click "Record GIF" to capture ~8s and encode.</span>
    <a class="download" id="dl" style="display:none">Download GIF</a>
  </div>

  <div id="stage">
    <div class="cell" id="cellA">
      <div class="chrome">
        <div class="titlebar"><span><span class="dot"></span>CHAT · A</span><span>word stream</span></div>
        <div class="thread" id="threadA"></div>
      </div>
    </div>
    <div class="cell" id="cellB">
      <div class="chrome">
        <div class="titlebar"><span><span class="dot"></span>CHAT · B</span><span>char stream</span></div>
        <div class="thread" id="threadB"></div>
      </div>
    </div>
  </div>

  <img id="preview" alt="preview" />
</div>

<!-- gif.js (canvas → animated GIF) -->
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<script>
/* --------- animation content --------- */
const PROMPTS = {
  A: { q: "What's a good way to start a morning?",
       a: "Try a 10-minute walk before checking your phone. Natural light sets your circadian rhythm and your first thought of the day ends up being your own." },
  B: { q: "Summarize quicksort in one line.",
       a: "Pick a pivot, split items into smaller and larger, then recursively sort each side until everything's in order." }
};

function el(tag, cls, txt){
  const n = document.createElement(tag);
  if(cls) n.className = cls;
  if(txt!=null) n.textContent = txt;
  return n;
}
function userRow(text){
  const row = el("div","row user");
  row.appendChild(el("div","bubble user", text));
  const av = el("div","avatar u"); av.textContent="Y";
  row.appendChild(av);
  return row;
}
function aiShell(extra=""){
  const row = el("div","row ai");
  const av = el("div","avatar"); av.textContent="◆";
  const bubble = el("div","bubble ai "+extra);
  row.appendChild(av); row.appendChild(bubble);
  return {row,bubble};
}
function statusRow(text){
  const s = el("div","status");
  s.appendChild(el("span","pulse"));
  s.appendChild(el("span",null,text));
  return s;
}
const sleep = ms => new Promise(r=>setTimeout(r,ms));

/* Deterministic pacing so the capture loops cleanly.
   Total cycle target: ~7.5s */
async function cycleA(thread){
  thread.innerHTML = "";
  thread.appendChild(userRow(PROMPTS.A.q));
  await sleep(550);
  const st = statusRow("thinking"); thread.appendChild(st);
  await sleep(600);
  st.remove();
  const {row,bubble} = aiShell();
  const span = el("span","tokens"); bubble.appendChild(span);
  thread.appendChild(row);

  const tokens = PROMPTS.A.a.match(/\S+\s*/g) || [];
  // deterministic per-token delay based on length
  for(let i=0;i<tokens.length;i++){
    const t = el("span","tok"); t.textContent = tokens[i];
    span.appendChild(t);
    const d = 70 + Math.min(90, tokens[i].length*10);
    await sleep(d);
  }
  await sleep(1400);
}
async function cycleB(thread){
  thread.innerHTML = "";
  thread.appendChild(userRow(PROMPTS.B.q));
  await sleep(550);
  const st = statusRow("typing"); thread.appendChild(st);
  await sleep(500);
  st.remove();
  const {row,bubble} = aiShell("mono");
  const text = el("span","tw");
  const caret = el("span","caret");
  bubble.appendChild(text); bubble.appendChild(caret);
  thread.appendChild(row);

  const a = PROMPTS.B.a;
  for(let i=0;i<a.length;i++){
    text.textContent += a[i];
    const c = a[i];
    let d = 26;
    if(c===" ") d = 18;
    if(",".includes(c)) d = 150;
    if(".!?".includes(c)) d = 230;
    await sleep(d);
  }
  await sleep(1200);
}

/* Run both animations in parallel, looping, until stopped */
let running = false;
async function startLoops(){
  running = true;
  const tA = document.getElementById("threadA");
  const tB = document.getElementById("threadB");
  (async()=>{ while(running){ await cycleA(tA);} })();
  (async()=>{ while(running){ await cycleB(tB);} })();
}
function stopLoops(){ running = false; }

/* Start looping immediately so the preview is live */
startLoops();

/* ---------------- GIF capture ---------------- */
document.getElementById("record").addEventListener("click", recordGif);

async function recordGif(){
  const btn = document.getElementById("record");
  const status = document.getElementById("status");
  btn.disabled = true;

  // restart loops in sync so capture starts from frame 0 of both cycles
  stopLoops();
  await sleep(30);
  document.getElementById("threadA").innerHTML="";
  document.getElementById("threadB").innerHTML="";
  await sleep(30);
  startLoops();

  const stage = document.getElementById("stage");
  const W = stage.offsetWidth, H = stage.offsetHeight;

  // gif.js config
  const gif = new GIF({
    workers: 2,
    quality: 10,
    width: W,
    height: H,
    workerScript: "https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js",
    background: "#fafaf8",
    dither: false,
  });

  gif.on("progress", p => {
    status.textContent = "Encoding GIF… " + Math.round(p*100) + "%";
  });

  gif.on("finished", blob => {
    const url = URL.createObjectURL(blob);
    const dl = document.getElementById("dl");
    dl.href = url;
    dl.download = "text-streaming.gif";
    dl.textContent = "Download GIF (" + (blob.size/1024).toFixed(0) + " KB)";
    dl.style.display = "inline";
    document.getElementById("preview").src = url;
    status.textContent = "Done.";
    btn.disabled = false;
    window.__gifBlob = blob; // handy for programmatic save
    window.__gifReady = true;
  });

  // Capture frames by rasterizing the DOM via SVG <foreignObject>
  const DURATION_MS = 8000;   // length of GIF
  const FPS = 18;
  const FRAME_MS = Math.round(1000/FPS);
  const nFrames = Math.round(DURATION_MS / FRAME_MS);

  // Pre-inline stylesheet into one string (so foreignObject has styles)
  const cssText = await collectCss();

  status.textContent = "Capturing frames 0/" + nFrames + "…";

  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  const t0 = performance.now();
  for(let i=0;i<nFrames;i++){
    const target = t0 + i*FRAME_MS;
    const now = performance.now();
    if(now < target) await sleep(target-now);

    const svg = domToSvg(stage, W, H, cssText);
    const img = await svgToImage(svg);
    ctx.fillStyle = "#fafaf8";
    ctx.fillRect(0,0,W,H);
    ctx.drawImage(img, 0, 0, W, H);
    gif.addFrame(ctx, {copy:true, delay: FRAME_MS});

    if(i%4===0) status.textContent = "Capturing frames "+(i+1)+"/"+nFrames+"…";
  }

  status.textContent = "Encoding GIF…";
  gif.render();
}

/* Serialize stylesheets for foreignObject */
async function collectCss(){
  let out = "";
  for(const sheet of document.styleSheets){
    try{
      for(const r of sheet.cssRules) out += r.cssText + "\n";
    }catch(e){ /* cross-origin, skip */ }
  }
  return out;
}

function domToSvg(node, w, h, cssText){
  const clone = node.cloneNode(true);
  // Force styles into the clone's root so foreignObject renders correctly
  const wrapper = document.createElement("div");
  wrapper.setAttribute("xmlns","http://www.w3.org/1999/xhtml");
  wrapper.style.width = w+"px";
  wrapper.style.height = h+"px";
  // include style
  const styleEl = document.createElement("style");
  styleEl.textContent = cssText;
  wrapper.appendChild(styleEl);
  wrapper.appendChild(clone);

  const serialized = new XMLSerializer().serializeToString(wrapper);
  const svg =
    `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`+
      `<foreignObject width="100%" height="100%">${serialized}</foreignObject>`+
    `</svg>`;
  return svg;
}

function svgToImage(svgString){
  return new Promise((resolve,reject)=>{
    const blob = new Blob([svgString],{type:"image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = ()=>{ URL.revokeObjectURL(url); resolve(img); };
    img.onerror = (e)=>{ URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}
</script>
</body>
</html>
